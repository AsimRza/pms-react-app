name: Lesson deployment process

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  example-job-1:
    name: Example Job 1 - Hello World
    runs-on: ubuntu-latest

    steps:
      - name: Print hello
        run: echo "Hello from Job 1!"

      - name: Print runner info
        run: |
          echo "OS: $RUNNER_OS"
          echo "Node: $(node -v)"
          echo "Branch: $GITHUB_REF_NAME"

  example-job-2:
    name: Example Job 2 - Checkout & List Files
    runs-on: ubuntu-latest
    needs: example-job-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: List project files
        run: ls -la

      - name: Show package.json name
        run: node -e "const p=require('./package.json'); console.log('Project:', p.name, 'v'+p.version)"

  example-job-3:
    name: Example Job 3 - Install & Build
    runs-on: ubuntu-latest
    needs: example-job-2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Confirm build output
        run: ls -la dist/
