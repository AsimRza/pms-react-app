name: Lesson deployment process

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  ci:
    name: Run CI (Lint, Type, Test, Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      # 1. Check version bump (push to main only)
      - name: Check version bump
        if: github.event_name == 'push'
        run: |
          PREV=$(git show HEAD~1:package.json | jq -r '.version')
          CURR=$(jq -r '.version' package.json)
          echo "Previous version: $PREV"
          echo "Current version:  $CURR"
          if [ "$PREV" = "$CURR" ]; then
            echo "❌ package.json version was not bumped. Please update the version before pushing to main."
            exit 1
          fi
          echo "✅ Version bumped: $PREV → $CURR"

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: npm

      # 3. Install deps
      - name: Install dependencies
        run: npm install

      # 4. Lint
      - name: Run ESLint
        run: npm run lint

      # 6. Test
      - name: Run tests
        run: npm run test

      # 7. Build
      - name: Build project
        run: npm run build

  cd:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: ci

    # yalnız main branch deploy olunsun
    if: github.ref == 'refs/heads/main'

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: npm

      # 3. Install deps
      - name: Install dependencies
        run: npm install

      # 4. Build
      - name: Build project
        run: npm run build

      # 5. Deploy
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: ./dist
          production-branch: main
          github-token: ${{ secrets.USER_TOKEN }}
          deploy-message: "🚀 Production Deploy from GitHub Actions"
          enable-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.N_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.N_SITE_ID }}
